# starship — кастомный промпт NixOS + Gruvbox + JetBrainsMono Nerd Font
# Две строки: первая — контекст, вторая — статус + приглашение

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$nix_shell\
$sudo\
$python\
$rust\
$golang\
$nodejs\
$lua\
$cmd_duration\
$jobs\
$line_break\
$status\
$character"""

right_format = "$time$battery"

# ── Палитра Gruvbox Dark ──────────────────────────────
# fg:        #ebdbb2    bg:        #282828
# red:       #fb4934    green:     #b8bb26
# yellow:    #fabd2f    blue:      #83a598
# purple:    #d3869b    aqua:      #8ec07c
# orange:    #fe8019    gray:      #928374

# ── Основные элементы ────────────────────────────────────

[character]
success_symbol = "[▶](bold #b8bb26)"
error_symbol = "[▶](bold #fb4934)"
vicmd_symbol = "[◀](bold #d3869b)"

[os]
disabled = false
style = "bold #8ec07c"
format = "[$symbol]($style) "

[os.symbols]
NixOS = " "
Linux = " "
Macos = " "
Windows = " "

[username]
show_always = true
style_user = "bold #d3869b"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "#928374"
format = "[@$hostname]($style) "

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold #fabd2f"
format = "[ ]($style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$symbol$branch]($style) "
style = "bold #8ec07c"

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
style = "#fe8019"

[git_status]
conflicted = "[](bold #fb4934) "
ahead = "[⇡$count](#fabd2f) "
behind = "[⇣$count](#fabd2f) "
diverged = "[⇕$ahead_behind](#fabd2f) "
untracked = "[?$count](#928374) "
stashed = "[⚑$count](#83a598) "
modified = "[!$count](#fe8019) "
staged = "[+$count](#b8bb26) "
renamed = "[»$count](#83a598) "
deleted = "[✘$count](#fb4934) "
style = ""

[nix_shell]
format = '[❄️ $state(\($name\))]($style) '
style = "bold #fe8019"
impure_msg = "impure"
pure_msg = "pure"

[sudo]
disabled = false
format = "[🔒]($style) "
style = "bold #fabd2f"

[cmd_duration]
min_time = 1000
show_milliseconds = true
format = "[⏱ $duration]($style) "
style = "italic #928374"

[jobs]
format = "[ $number]($style) "
style = "bold #83a598"
threshold = 1

[status]
disabled = false
format = "[$status]($style) "
style = "bold #fb4934"
map_symbol = true
pipestatus = true

[time]
disabled = false
format = "[ $time]($style) "
style = "italic #928374"
time_format = "%H:%M"

[battery]
disabled = false
full_symbol = " "
charging_symbol = " "
discharging_symbol = " "
display = [
  { threshold = 100, style = "bold #b8bb26" },
  { threshold = 20, style = "#fe8019" },
  { threshold = 0, style = "bold #fb4934" },
]

# ── Языковые модули (только по обнаружению проекта) ──────

[python]
format = '[🐍 $version(\($virtualenv\))]($style) '
style = "bold #fabd2f"
detect_extensions = ["py"]
detect_files = ["Pipfile", "pyproject.toml", "requirements.txt", ".python-version"]

[rust]
format = "[🦀 $version]($style) "
style = "bold #fe8019"

[golang]
format = "[ $version]($style) "
style = "bold #83a598"

[nodejs]
format = "[ $version]($style) "
style = "bold #b8bb26"
detect_extensions = []
detect_files = ["package.json", ".node-version"]
detect_folders = []

[lua]
format = "[🌙 $version]($style) "
style = "bold #83a598"
detect_extensions = ["lua"]
[aws]
disabled = true
[azure]
disabled = true
[gcloud]
disabled = true
[openstack]
disabled = true
[container]
disabled = true
[kubernetes]
disabled = true
