[manager]
ratio = [1, 4, 3]
show_hidden = false
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
linemode = "size"
show_symlink = true

[preview]
tab_size = 2
max_width = 600
max_height = 900
image_filter = "lanczos3"

[opener]
rules = [
  { mime = "text/*", run = 'nvim "$@"' },
  { mime = "image/*", run = 'xdg-open "$@"' },
  { mime = "video/*", run = 'xdg-open "$@"' },
  { mime = "audio/*", run = 'xdg-open "$@"' },
  { mime = "application/pdf", run = 'xdg-open "$@"' },
]
